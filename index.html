<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rayan's Sssssnakey Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: linear-gradient(135deg, #16222A, #3A6073);
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      color: white;
    }
    h1 {
      text-align: center;
      font-family: 'Press Start 2P', cursive;
      font-size: 20px;
      margin: 10px 0;
      color: #00ffcc;
      text-shadow: 2px 2px 0 #000;
    }
    #score {
      position: absolute;
      top: 60px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      color: #fff;
    }
    canvas {
      display: block;
      margin: 100px auto 0;
      border: 3px solid #0f0;
      background-color: #000;
    }
    #tryAgainPanel {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      padding: 20px 40px;
      border-radius: 12px;
      color: white;
      text-align: center;
      display: none;
    }
    #tryAgainPanel button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #00ff99;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-family: 'Orbitron', sans-serif;
    }
    #tryAgainPanel button:hover {
      background: #00cc77;
    }
    #leaderboard {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>Rayan's Sssssnakey Game</h1>
<div id="score">Score: 0</div>
<div id="leaderboard">High Score: 0</div>
<canvas id="gameCanvas" width="500" height="500"></canvas>

<div id="tryAgainPanel">
  <h2>Game Over</h2>
  <p id="finalScore">Score: 0</p>
  <button id="tryAgainButton">Try Again</button>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('score');
  const tryAgainPanel = document.getElementById('tryAgainPanel');
  const finalScoreText = document.getElementById('finalScore');
  const tryAgainBtn = document.getElementById('tryAgainButton');
  const leaderboard = document.getElementById('leaderboard');

  const gridSize = 20;
  const tileCount = canvas.width / gridSize;

  let snake, food, dx, dy, score, speed, gameInterval, highScore = 0;

  const eatSound = new Audio('https://freesound.org/data/previews/82/82526_1022651-lq.mp3');
  const dieSound = new Audio('https://freesound.org/data/previews/331/331912_3248244-lq.mp3');

  function startGame() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    dx = 1;
    dy = 0;
    score = 0;
    speed = 120;
    placeFood();
    updateScore();
    tryAgainPanel.style.display = 'none';
    clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, speed);
  }

  function gameLoop() {
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    if (isGameOver(head)) {
      dieSound.play();
      clearInterval(gameInterval);
      finalScoreText.textContent = `Score: ${score}`;
      tryAgainPanel.style.display = 'block';
      if (score > highScore) {
        highScore = score;
        leaderboard.textContent = `High Score: ${highScore}`;
      }
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      eatSound.play();
      speed = Math.max(40, speed - 2);
      updateScore();
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, speed);
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2.5, 0, Math.PI * 2);
    ctx.fill();

    snake.forEach((segment, index) => {
      const gradient = ctx.createRadialGradient(
        segment.x * gridSize + gridSize / 2,
        segment.y * gridSize + gridSize / 2,
        2,
        segment.x * gridSize + gridSize / 2,
        segment.y * gridSize + gridSize / 2,
        gridSize / 2.5
      );
      gradient.addColorStop(0, '#0f0');
      gradient.addColorStop(1, '#070');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(segment.x * gridSize + gridSize / 2, segment.y * gridSize + gridSize / 2, gridSize / 2.5, 0, Math.PI * 2);
      ctx.fill();
      if (index === 0) drawEyes(segment);
    });
  }

  function drawEyes(head) {
    ctx.fillStyle = '#000';
    const offsetX = dx === 0 ? 4 : 0;
    const offsetY = dy === 0 ? 4 : 0;
    ctx.beginPath();
    ctx.arc(head.x * gridSize + gridSize / 2 - offsetX, head.y * gridSize + gridSize / 2 - offsetY, 2, 0, Math.PI * 2);
    ctx.arc(head.x * gridSize + gridSize / 2 + offsetX, head.y * gridSize + gridSize / 2 - offsetY, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function placeFood() {
    food = {
      x: Math.floor(Math.random() * tileCount),
      y: Math.floor(Math.random() * tileCount)
    };
  }

  function isGameOver(pos) {
    if (pos.x < 0 || pos.y < 0 || pos.x >= tileCount || pos.y >= tileCount) return true;
    return snake.some((s, i) => i !== 0 && s.x === pos.x && s.y === pos.y);
  }

  function updateScore() {
    scoreDisplay.textContent = `Score: ${score}`;
  }

  function handleKey(e) {
    if (e.key === 'ArrowUp' && dy === 0) {
      dx = 0; dy = -1;
    } else if (e.key === 'ArrowDown' && dy === 0) {
      dx = 0; dy = 1;
    } else if (e.key === 'ArrowLeft' && dx === 0) {
      dx = -1; dy = 0;
    } else if (e.key === 'ArrowRight' && dx === 0) {
      dx = 1; dy = 0;
    }
  }

  function handleTouch() {
    // Mobile swipe support placeholder (to be implemented if needed)
  }

  tryAgainBtn.addEventListener('click', startGame);
  document.addEventListener('keydown', handleKey);

  startGame();
</script>

</body>
</html>
